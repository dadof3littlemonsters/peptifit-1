services:
  # Next.js Frontend
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* variables are inlined by the Next.js compiler at BUILD
        # TIME — setting them only under `environment:` below is too late (that
        # is runtime). They must be passed as build args so they are baked into
        # the client-side JS bundle during `npm run build`.
        - NEXT_PUBLIC_API_URL=/api
    container_name: peptifit_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - stack

  # Node.js Backend API (root; /health works)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peptifit_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./database.sqlite
      - VOICE_API_KEY=${VOICE_API_KEY:-peptifit-voice-key}
      - AI_PROVIDER=${AI_PROVIDER:-dashscope}
      - COACH_AI_PROVIDER=${COACH_AI_PROVIDER:-dashscope}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_URL=${DASHSCOPE_API_URL:-}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-}
      - COACH_DASHSCOPE_API_KEY=${COACH_DASHSCOPE_API_KEY:-}
      - COACH_DASHSCOPE_API_URL=${COACH_DASHSCOPE_API_URL:-}
      - COACH_DASHSCOPE_MODEL=${COACH_DASHSCOPE_MODEL:-qwen3.5-plus}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - COACH_DEEPSEEK_API_KEY=${COACH_DEEPSEEK_API_KEY:-}
      - COACH_DEEPSEEK_API_URL=${COACH_DEEPSEEK_API_URL:-}
      - COACH_DEEPSEEK_MODEL=${COACH_DEEPSEEK_MODEL:-deepseek-chat}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_URL=${GROQ_API_URL:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - COACH_GROQ_API_KEY=${COACH_GROQ_API_KEY:-}
      - COACH_GROQ_API_URL=${COACH_GROQ_API_URL:-}
      - COACH_GROQ_MODEL=${COACH_GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_API_URL=${OPENROUTER_API_URL:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-x-ai/grok-4.1-fast}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER:-}
      - OPENROUTER_TITLE=${OPENROUTER_TITLE:-PeptiFit}
      - COACH_OPENROUTER_API_KEY=${COACH_OPENROUTER_API_KEY:-}
      - COACH_OPENROUTER_API_URL=${COACH_OPENROUTER_API_URL:-}
      - COACH_OPENROUTER_MODEL=${COACH_OPENROUTER_MODEL:-x-ai/grok-4.1-fast}
      - COACH_OPENROUTER_REFERER=${COACH_OPENROUTER_REFERER:-}
      - COACH_OPENROUTER_TITLE=${COACH_OPENROUTER_TITLE:-PeptiFit}
      - FATSECRET_ENABLED=${FATSECRET_ENABLED:-false}
      - FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID:-}
      - FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET:-}
      - FATSECRET_SCOPE=${FATSECRET_SCOPE:-premier}
      - FATSECRET_REGION=${FATSECRET_REGION:-GB}
      - FATSECRET_LANGUAGE=${FATSECRET_LANGUAGE:-en}
      - COFID_REFRESH_KEY=${COFID_REFRESH_KEY:-peptifit-cofid-refresh-key-change-in-production}
      - COFID_REFRESH_CRON=${COFID_REFRESH_CRON:-}
    volumes:
      - ./data:/app/data
    networks:
      - stack

  # Caddy reverse proxy (edge) — auto HTTPS
  caddy:
    image: caddy:alpine
    container_name: peptifit_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - backend
    networks:
      - stack

  # Apache Guacamole - Multi-protocol remote desktop gateway
  guacd:
    image: guacamole/guacd:latest
    container_name: peptifit_guacd
    restart: unless-stopped
    volumes:
      - guacd_drive:/drive
      - guacd_record:/record
    networks:
      - stack

  guacamole_db:
    image: mysql:8.0
    container_name: peptifit_guacamole_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${GUACAMOLE_DB_ROOT_PASSWORD:-guacamole_root}
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_password}
    volumes:
      - guacamole_db_data:/var/lib/mysql
    networks:
      - stack

  guacamole:
    image: guacamole/guacamole:latest
    container_name: peptifit_guacamole
    restart: unless-stopped
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      MYSQL_HOSTNAME: guacamole_db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole_password}
      MYSQL_AUTO_CREATE_ACCOUNTS: "true"
    depends_on:
      - guacd
      - guacamole_db
    networks:
      - stack

  # Syncthing - File Synchronization
  syncthing:
    image: syncthing/syncthing:latest
    container_name: peptifit_syncthing
    restart: unless-stopped
    hostname: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - STGUIADDRESS=0.0.0.0:8384
    volumes:
      - ./syncthing-config:/var/syncthing/config
      - syncthing_data:/var/syncthing/Sync
      - /home/peptifit/transcription-pipeline/uploads:/var/syncthing/uploads
      - /home/peptifit/transcription-pipeline/outputs/docs:/var/syncthing/kate-outputs:ro
      - /home/peptifit/transcription-pipeline/outputs/docs/keira:/var/syncthing/keira-outputs:ro
    networks:
      - stack
    # Don't expose ports directly - access through Caddy reverse proxy

networks:
  stack:
    driver: bridge

volumes:
  data:
  caddy_data:
  caddy_config:
  guacd_drive:
  guacd_record:
  guacamole_db_data:
  syncthing_config:
  syncthing_data:
